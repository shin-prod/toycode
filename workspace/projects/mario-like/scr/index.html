<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mario-like</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>mario-like（オリジナル）</h1>
      <div class="hud" id="hud">Loading...</div>
      <div class="help">
        操作: ←→ 移動 / Space(↑) ジャンプ / R リスタート
      </div>
    </header>

    <canvas id="game" width="960" height="540"></canvas>

    <footer>
      <small>
        素材はすべて図形描画のみ。マリオ/任天堂の素材は不使用。
      </small>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
